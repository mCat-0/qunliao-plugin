<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8" />
    <link rel="stylesheet" type="text/css" href="{{pluResPath}}html/hotSearch/hotSearch.css" />
    <style>{{data.glassStyle}</style>
  </head>
  <body>
    <div class="container" id="container">
      <div class="bg" id="bgBox">
        <img
          src="{{data.cover}}"
          class="bg-img"
          id="bgImg"
          onload="this.classList.add('loaded'); window.__H5Loaded = true; document.dispatchEvent(new Event('bg-ready')); try { document.getElementById('bgImg').classList.add('loaded'); } catch(e){}"
          onerror="this.parentNode.classList.add('no-bg'); window.__H5Loaded = true;"
        />
        <div class="bg-mask"></div>
      </div>

      <div class="header card">
        <div class="title">&#128293; {{data.platformName}} · 实时热搜榜</div>
        <div class="subtitle">{{data.updateTime}}</div>
      </div>

      <div class="list card">
        {{each data.list item index}}
        <div class="row">
          <div class="rank rank-{{index + 1}}">{{index + 1}}</div>
          <div class="title-wrap">
            <div class="t1">{{item.title}}</div>
            {{if item.hotValue}}<div class="hot">&#128293; {{item.hotValue}}</div>{{/if}}
          </div>
        </div>
        {{/each}}
      </div>

      <div class="footer card-inner">
        <span>数据来源：uapis.cn · mCat 群聊插件</span>
      </div>
    </div>
    <script>
      // 如果图片来自 data:image 等，onload 未必触发。统一设置一个保底时间点。
      (function () {
        function markReady () {
          if (window.__H5Loaded) return;
          window.__H5Loaded = true;
          document.getElementById('container').classList.add('h5-loaded');
        }
        var img = document.getElementById('bgImg');
        if (img && img.complete) {
          markReady();
        } else if (img) {
          img.addEventListener('load', markReady, { once: true });
          img.addEventListener('error', markReady, { once: true });
        }
        // 无论图片 onload 失败，兜底 2s 后强制标记，避免永远挂起
        setTimeout(markReady, 2000);
      })();
    </script>
  </body>
</html>
