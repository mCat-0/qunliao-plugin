# ============================================================
# Qunliao Plugin Global Configuration (Default)
# ============================================================

# ------------------------------------------------------------
# 通用配置 Global Settings
# ------------------------------------------------------------
requestTimeoutMs: 15000
userAgent: "YunzaiBot/3.0 qunliao-plugin/1.0"

# 全局白名单群，留空则所有群可用。私聊用 8888 代替
onlyGroupID: []

# ------------------------------------------------------------
# 每日早报 Daily News
# ------------------------------------------------------------
dailyNews:
  # 是否启用模块
  enabled: true
  # 早报数据来源 API
  apiUrl: "https://60s.crystelf.top/v2/60s"
  # 封面图 API（可选，留空则不使用封面）
  coverImageUrl: "https://api.elaina.cat/random/pc/"
  # 定时推送 cron 表达式 (默认每日 06:30)
  cron: "0 30 6 * * ?"
  # 图片缓存有效期（小时，默认 12 小时；最大 18 小时 — 防止跨天命中旧数据）
  cacheTtlHours: 12
  # 清理过期缓存文件时保留的天数（防止 disk 堆积）
  cacheKeepDays: 2
  # 推送白名单群（仅对这些群推送），留空则使用全局白名单
  onlyGroupID: []

# ------------------------------------------------------------
# 早晚安问候 Good Morning / Good Night
# ------------------------------------------------------------
goodNight:
  # 是否启用模块
  enabled: true
  # 是否对触发晚安的用户进行禁言
  muteEnabled: true
  # 禁言时长（秒），默认 8 小时 = 28800 秒
  muteSeconds: 28800
  # 晚安关键词（任意一个匹配即触发）
  goodNightKeywords: ["睡觉了", "我要睡了", "晚安", "我要休息了"]
  # 早安关键词（任意一个匹配即触发）
  goodMorningKeywords: ["早安", "早上好", "起床", "睡醒了"]
  # 晚安 API 地址（返回文本问候语）
  goodNightAPI: "https://api.ruseo.cn/api/wanan"
  # 早安 API 地址
  goodMorningAPI: "https://api.ruseo.cn/api/zaoan"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 热搜 Hot Search
# ------------------------------------------------------------
hotSearch:
  # 是否启用模块
  enabled: true
  # 默认平台（当用户只输入 #热搜 时使用此平台）
  # 可选: douyin weibo bilibili baidu toutiao sina genshin kuaishou xiaohongshu zhihu starrail
  defaultPlatform: "douyin"
  # 数据接口
  apiUrl: "https://uapis.cn/api/v1/misc/hotboard"
  # 背景图 API 基址（默认为 uapis.cn 随机图）
  bgBaseUrl: "https://uapis.cn/api/v1/random/image"
  # 背景图分类 category（acg | bq | furry | mobile_wallpaper | pc_wallpaper | general_anime | ai_drawing | landscape）
  bgCategory: "mobile_wallpaper"
  # 背景图分类 type（仅 acg/bq/furry 生效；其它分类可留空）
  bgType: ""
  # 背景图自定义 URL（填此则跳过 category/type 拼装）
  bgCustomUrl: ""
  # ---------- 毛玻璃卡片 ----------
  # 是否启用毛玻璃（false 时退化为纯色半透明卡片）
  glassEnabled: true
  # 模糊半径（px，建议 0~24，越大越模糊）
  glassBlur: 3
  # 饱和度（%，建议 100~180；=100 表示不增强色彩）
  glassSaturate: 140
  # 背景不透明度（0~1，越大越不透明；建议 0.25~0.55）
  glassOpacity: 0.35
  # 边框颜色（rgba/rgb/#xxxxxx 都可）
  glassBorder: "rgba(255,255,255,0.18)"
  # 圆角（px，建议 8~24）
  glassRadius: 16
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 天气 Weather
# ------------------------------------------------------------
weather:
  # 是否启用模块
  enabled: true
  # 默认城市（当指令未指定城市时使用此城市）
  defaultCity: ""
  # 天气数据接口
  apiUrl: "https://api.suyanw.cn/api/weather.php"
  # 背景图 API 基址
  bgBaseUrl: "https://uapis.cn/api/v1/random/image"
  # 背景图分类 category（acg | bq | furry | mobile_wallpaper | pc_wallpaper | general_anime | ai_drawing | landscape）
  bgCategory: "acg"
  # 背景图分类 type（仅 acg / bq / furry 时生效；本模块默认 mb=手机壁纸）
  bgType: "mb"
  # 背景图自定义 URL（填此则跳过 category/type 拼装）
  bgCustomUrl: ""
  # ---------- 毛玻璃卡片 ----------
  glassEnabled: true
  glassBlur: 3
  glassSaturate: 140
  glassOpacity: 0.35
  glassBorder: "rgba(255,255,255,0.18)"
  glassRadius: 16
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# B站直播推送 Bilibili Live Push
# ------------------------------------------------------------
bilitvPush:
  # 是否启用模块
  enabled: true
  # 订阅的 B站 UID（mid），支持逗号/空格/换行分隔；示例：401742377, 1636034895
  # 验证方法：浏览器打开 https://space.bilibili.com/<UID>
  subscribeUIDs: "401742377, 1636034895, 1340190821, 3546886017387331"
  # 定时扫描小时（0~23），逗号或空格分隔；示例：6, 11, 12, 18, 20, 22
  cronHours: "6, 11, 12, 18, 20, 22"
  # 兜底扫描间隔（小时），确保即便 cron 小时都没触发，也会定期扫描一次
  scanIntervalHours: 8
  # 单个直播间的冷却时间（小时）：同一 roomId 在冷却期内不会重复推送；0 表示关闭去重
  cooldownHours: 2
  # 推送目标群：留空则继承 Yunzai 的全局 onlyGroupID；填数字群号逗号分隔
  whitelistGroups: ""
  # 允许执行 #B站推送 / #B站全部推送 / #群聊插件版本 的额外管理员 QQ
  extraAdminQQ: ""
  # 夜间是否扫描：false 表示在 [nightStartHour, nightEndHour) 期间不扫描
  nightScanEnabled: false
  # 夜间开始小时（0~23）
  nightStartHour: 23
  # 夜间结束小时（0~23），必须不等于 nightStartHour，结束时间可跨 0 点
  nightEndHour: 8
  # ---------- 毛玻璃卡片 ----------
  glassEnabled: true
  glassBlur: 3
  glassSaturate: 140
  glassOpacity: 0.35
  glassBorder: "rgba(255,255,255,0.18)"
  glassRadius: 16
  # ---------- 背景渐变滤镜（叠加在封面之上） ----------
  # 是否启用背景渐变滤镜（关闭后封面直接显示，不叠加彩色渐变）
  coverFilterEnabled: true
  # 自定义渐变（任何合法 CSS background 值，如 linear-gradient / radial-gradient；留空使用默认）
  # 示例：linear-gradient(135deg, rgba(251, 113, 133, 0.40) 0%, rgba(88, 28, 135, 0.35) 100%)
  coverGradient: "linear-gradient(135deg, rgba(14,165,233,0.45) 0%, rgba(99,102,241,0.40) 50%, rgba(236,72,153,0.40) 100%)"
  # 渐变末端黑色蒙版强度（0~1，越大底部越暗，便于文字显示）
  coverMaskOpacity: 0.55

# ------------------------------------------------------------
# 毒鸡汤 Dujitang
# ------------------------------------------------------------
dujitang:
  # 是否启用模块
  enabled: true
  # 数据接口（主）
  apiUrl: "https://api.suyanw.cn/api/djt.php"
  # 备用数据接口（主接口失败时尝试）
  apiUrl2: "https://v2.xxapi.cn/api/dujitang"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 舔狗日记 Dog Diary
# ------------------------------------------------------------
dogDiary:
  # 是否启用模块
  enabled: true
  # 数据接口
  apiUrl: "https://v2.xxapi.cn/api/dog"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# Cos 图片 Cos Image
# ------------------------------------------------------------
cosImage:
  # 是否启用模块
  enabled: true
  # 数据接口（支持多个，用英文逗号分隔；随机选取，失败自动回退到下一个）
  apiUrl: "https://v2.xxapi.cn/api/yscos"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# JK 图片 JK Image
# ------------------------------------------------------------
jkImage:
  # 是否启用模块
  enabled: true
  # 数据接口（支持多个，用英文逗号分隔；随机选取，失败自动回退到下一个）
  apiUrl: "https://api.ruseo.cn/api/jk"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 黑丝 图片 Black Stocking Image
# ------------------------------------------------------------
heisiImage:
  # 是否启用模块
  enabled: true
  # 数据接口（支持多个，用英文逗号分隔；随机选取，失败自动回退到下一个）
  apiUrl: "http://api.yujn.cn/api/heisi.php, https://api.ruseo.cn/api/heisi, https://api.suyanw.cn/api/hs.php"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 白丝 图片 White Stocking Image
# ------------------------------------------------------------
baisiImage:
  # 是否启用模块
  enabled: true
  # 数据接口（支持多个，用英文逗号分隔；随机选取，失败自动回退到下一个）
  apiUrl: "https://api.ruseo.cn/api/baisi"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# KFC 疯狂星期四 KFC Crazy Thursday
# ------------------------------------------------------------
KFCV50:
  # 是否启用模块
  enabled: true
  # 数据接口
  apiUrl: "https://api.suyanw.cn/api/kfcyl.php?type=json"
  # 触发关键词（任意匹配即触发）
  triggerKeywords: ["疯狂星期四", "吃肯德基", "kfc", "KFC", "#v50", "#V50"]
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 历史上的今天 History Today
# ------------------------------------------------------------
historyToday:
  # 是否启用模块
  enabled: true
  # 数据接口
  apiUrl: "https://uapis.cn/api/v1/misc/historytoday"
  # 最多显示几条历史事件
  maxItems: 10
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 结婚证生成器 Marriage Certificate
# ------------------------------------------------------------
marriageCertificate:
  # 是否启用模块
  enabled: true
  # 数据接口（返回图片，URL 中的 n1 和 n2 会自动填充姓名）
  apiUrl: "https://www.hhlqilongzhu.cn/api/tu_jiehunzheng.php"
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 群聊帮助 Help
# ------------------------------------------------------------
help:
  # 是否启用模块
  enabled: true
  # 图片主标题（显示在左上角，60px 字体）
  title: "群聊帮助"
  # 图片副标题（显示在主标题下方，20px 字体）
  subtitle: "mCat群聊指令查看"
  # 背景模式：api（使用随机背景图 API）或 local（使用本地图片）
  bgMode: "api"
  # 背景图片 API（bgMode=api 时生效）
  bgApiUrl: "https://api.elaina.cat/random/mobile"
  # 本地背景图片路径（bgMode=local 时生效）
  # 例如：C:/Users/xxx/Pictures/mybg.jpg 或 /home/xxx/bg.jpg
  bgLocalPath: ""
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []

# ------------------------------------------------------------
# 在线更新 Update / Repair
# ------------------------------------------------------------
update:
  # 是否启用模块（仅管理员可用）
  enabled: true
  # 默认拉取平台：github / gitee / gitlab
  defaultPlatform: "gitlab"
  # GitHub 分支
  githubBranch: "main"
  # GitHub 加速代理（如 https://ghproxy.com/，留空则直连）
  githubProxy: ""
  # Gitee 分支
  giteeBranch: "main"
  # Gitee 账号密码（当 Gitee 要求登录时使用；留空则匿名访问）
  giteeUsername: ""
  giteePassword: ""
  # GitLab 分支
  gitlabBranch: "main"
  # GitLab Access Token（当 GitLab 仓库为私有时需要；留空则匿名访问）
  gitlabAccessToken: ""
  # SSH 私钥路径（非默认文件名时填，如 ~/.ssh/id_ed25519_qunliao；留空则用 SSH 默认）
  sshKeyPath: ""
  # 额外管理员 QQ（除 Yunzai 内置 master 之外，允许使用更新指令）
  extraAdminQQ: []
  # 生效的群列表，留空则所有群生效
  onlyGroupID: []
